<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>PDFMaster</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
background:#f5f5f5;
text-align:center;
padding:60px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h1{
font-size:40px;
margin-bottom:10px;
}

p{
color:#555;
}

.tools{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-top:40px;
}

.tool{
padding:20px;
border:1px solid #eee;
border-radius:10px;
transition:.3s;
cursor:pointer;
}

.tool:hover{
border-color:red;
transform:translateY(-3px);
}

</style>

</head>

<body>

<div class="container">

<h1>PDFMaster</h1>

<p>All-in-One PDF Tools</p>

<div class="tools">

<div class="tool">Word to PDF</div>

<div class="tool">PDF to Word</div>

<div class="tool">Compress PDF</div>

<div class="tool">Merge PDF</div>

<div class="tool">Split PDF</div>

<div class="tool">PDF to Image</div>

</div>

</div>

</body>
</html>
