{% extends "base.html" %}
{% block content %}

<div class="flex min-h-screen bg-gray-100">

    <!-- LEFT: Preview Area -->
    <div class="w-2/3 p-10">

        <h2 class="text-2xl font-bold mb-6">
            PDF Preview
        </h2>

        <div class="border-2 border-dashed 
                    border-gray-300 
                    rounded-xl 
                    h-96 
                    flex items-center 
                    justify-center 
                    bg-white">

            <p class="text-gray-400">
                Preview halaman PDF akan muncul di sini
            </p>

        </div>

    </div>

    <!-- RIGHT: Control Panel -->
    <div class="w-1/3 bg-white p-8 shadow-lg">

        <h2 class="text-2xl font-bold mb-6">
            Split
        </h2>

        <form action="/tools/split-pdf"
              method="post"
              enctype="multipart/form-data"
              class="space-y-6">

            <!-- Upload -->
            <input type="file"
                   name="file"
                   accept=".pdf"
                   required
                   class="w-full border p-2 rounded">

            <!-- Range Mode -->
            <div>
                <label class="font-semibold block mb-2">
                    Range
                </label>

                <div class="flex gap-2">
                    <input type="number"
                           name="from_page"
                           placeholder="From"
                           class="w-1/2 border p-2 rounded">

                    <input type="number"
                           name="to_page"
                           placeholder="To"
                           class="w-1/2 border p-2 rounded">
                </div>
            </div>

            <!-- Button -->
            <button type="submit"
                    class="bg-red-600 hover:bg-red-700 
                           text-white w-full py-3 
                           rounded-xl text-lg">
                Split PDF
            </button>

        </form>

    </div>

</div>

{% endblock %}
