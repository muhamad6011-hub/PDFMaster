<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Compress JPG & PNG Images</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-50">


<!-- NAVBAR -->

<header class="bg-white shadow-sm">

<div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">

<a href="../index.html" class="text-2xl font-bold text-red-600">
PDFMaster
</a>

<nav class="flex items-center space-x-6 text-sm md:text-base font-medium">

<a href="../blog.html" class="text-gray-700 hover:text-red-600">Blog</a>
<a href="../login.html" class="text-gray-700 hover:text-red-600">Login</a>

</nav>

</div>

</header>



<main class="py-10">

<div class="max-w-3xl mx-auto px-6">

<!-- HEADER -->

<div class="text-center mb-10">

<h1 class="text-4xl font-bold text-gray-800 mb-3">
Compress JPG & PNG Images
</h1>

<p class="text-gray-500 text-lg">
Reduce image size while keeping the best possible quality.
Fast, free, and secure.
</p>

</div>



<!-- TOOL CARD -->

<div class="bg-white p-8 rounded-2xl shadow-lg border">

<form id="compressForm">

<!-- UPLOAD -->

<label class="block mb-3 font-semibold text-gray-700">
Upload Image
</label>

<div class="border-2 border-dashed border-gray-300 rounded-xl p-8 text-center">

<input
type="file"
id="file"
accept=".jpg,.jpeg,.png"
required
class="mx-auto mb-4">

<p class="text-gray-500 text-sm">
Supported formats: JPG, JPEG, PNG
</p>

</div>


<!-- QUALITY -->

<div class="mt-6">

<label class="block mb-2 font-semibold text-gray-700">
Compression Level
</label>

<select
id="quality"
class="w-full border rounded-lg p-3">

<option value="90">High Quality (Larger File)</option>
<option value="70">Balanced (Recommended)</option>
<option value="50">Small Size</option>

</select>

</div>


<!-- BUTTON -->

<div class="mt-8 text-center">

<button
type="submit"
class="bg-red-600 text-white px-8 py-3 rounded-xl font-semibold text-lg hover:bg-red-700 transition">

Compress Image

</button>

</div>

</form>

</div>



<!-- RESULT -->

<div id="result" class="mt-8 text-center hidden">

<a id="download"
class="bg-green-600 text-white px-6 py-3 rounded-lg">

Download Compressed Image

</a>

</div>



<!-- INFO -->

<div class="mt-10 text-center text-gray-500 text-sm">

<p>
Your files are processed securely and deleted automatically after compression.
</p>

</div>

</div>

</main>



<script>

const form = document.getElementById("compressForm")

form.addEventListener("submit", async (e)=>{

e.preventDefault()

const file = document.getElementById("file").files[0]
const quality = document.getElementById("quality").value

const formData = new FormData()

formData.append("file", file)
formData.append("quality", quality)

const res = await fetch("https://api.pdfmaster.com/tools/compress-image",{
method:"POST",
body:formData
})

if(res.ok){

const blob = await res.blob()

const url = window.URL.createObjectURL(blob)

const download = document.getElementById("download")
download.href = url
download.download = "compressed-image.jpg"

document.getElementById("result").classList.remove("hidden")

}else{

alert("Compression failed")

}

})

</script>


</body>
</html>
