{% extends "base.html" %}
{% block title %}PDF to Word - PDFMaster{% endblock %}

{% block content %}

<div class="max-w-xl mx-auto">

    <h2 class="text-2xl font-bold mb-6 text-center">
        PDF to Word
    </h2>

    <form action="/tools/pdf-to-word"
          method="post"
          enctype="multipart/form-data"
          class="bg-white p-8 rounded-xl shadow-md space-y-6">

        <!-- Upload -->
        <div>
            <label class="block mb-2 font-semibold">
                Upload PDF File
            </label>

            <input type="file"
                   name="file"
                   accept=".pdf"
                   required
                   class="w-full border p-2 rounded">
        </div>

        <!-- Info -->
        <p class="text-sm text-gray-500">
            Convert your PDF file into an editable Word document (.docx).
        </p>

        <!-- Button -->
        <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg transition">
            Convert to Word
        </button>

    </form>

</div>

{% endblock %}
