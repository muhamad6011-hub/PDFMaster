{% extends "base.html" %}
{% block content %}

<h2 class="text-2xl font-bold mb-6">Word to PDF</h2>

<form action="/tools/word-to-pdf" method="post" enctype="multipart/form-data"
      class="bg-white p-6 rounded shadow">

    <input type="file" name="file" accept=".docx" required
           class="mb-4 block">

    <button type="submit"
            class="bg-red-600 text-white px-4 py-2 rounded">
        Convert
    </button>

</form>

{% endblock %}
