{% extends "base.html" %}
{% block content %}

<div class="max-w-2xl mx-auto text-center">

    <h1 class="text-3xl font-bold mb-2">
        Merge PDF Files
    </h1>

    <p class="text-gray-500 mb-8">
        Combine multiple PDF files into one document.
    </p>

    <form id="mergeForm"
          action="/tools/merge-pdf"
          method="post"
          enctype="multipart/form-data"
          class="bg-white p-8 rounded-2xl shadow-md">

        <!-- Upload Button -->
        <label class="block mb-6">
            <span class="bg-red-600 hover:bg-red-700 
                         text-white px-6 py-3 
                         rounded-xl cursor-pointer 
                         transition text-lg font-semibold">
                Select PDF Files
            </span>

            <input type="file"
                   id="fileInput"
                   accept=".pdf"
                   multiple
                   class="hidden">
        </label>

        <!-- File List -->
        <div id="fileList"
             class="text-left space-y-2 mb-6">
        </div>

        <!-- Merge Button -->
        <button type="submit"
                class="bg-blue-600 hover:bg-blue-700 
                       text-white px-6 py-3 
                       rounded-xl w-full transition">
            Merge PDF
        </button>

    </form>

</div>

<script>
let storedFiles = [];
const input = document.getElementById("fileInput");
const fileListDiv = document.getElementById("fileList");
const form = document.getElementById("mergeForm");

input.addEventListener("change", function() {

    const newFiles = Array.from(input.files);

    newFiles.forEach(file => {
        // Hindari duplikat nama file
        if (!storedFiles.some(f => f.name === file.name)) {
            storedFiles.push(file);
        }
    });

    renderFileList();
    input.value = ""; // reset supaya bisa klik lagi
});

function renderFileList() {

    fileListDiv.innerHTML = "";
    const maxDisplay = 10;

    storedFiles.slice(0, maxDisplay).forEach((file, index) => {

        const div = document.createElement("div");
        div.className = "flex justify-between items-center bg-gray-100 p-2 rounded";

        div.innerHTML = `
            <span>Berkas ${index + 1}: ${file.name}</span>
            <button type="button"
                    onclick="removeFile(${index})"
                    class="text-red-600 hover:text-red-800">
                Hapus
            </button>
        `;

        fileListDiv.appendChild(div);
    });

    if (storedFiles.length > maxDisplay) {
        const more = document.createElement("div");
        more.className = "text-gray-500 text-sm";
        more.textContent = `Dan ${storedFiles.length - maxDisplay} berkas lainnya...`;
        fileListDiv.appendChild(more);
    }
}

function removeFile(index) {
    storedFiles.splice(index, 1);
    renderFileList();
}

form.addEventListener("submit", function(e) {

    if (storedFiles.length === 0) {
        e.preventDefault();
        alert("Pilih minimal 1 file PDF.");
        return;
    }

    const dataTransfer = new DataTransfer();

    storedFiles.forEach(file => {
        dataTransfer.items.add(file);
    });

    const hiddenInput = document.createElement("input");
    hiddenInput.type = "file";
    hiddenInput.name = "files";
    hiddenInput.files = dataTransfer.files;
    hiddenInput.style.display = "none";

    form.appendChild(hiddenInput);
});
</script>

{% endblock %}
