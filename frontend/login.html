<!DOCTYPE html>
<html>
<head>

<title>Login - PDFMaster</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
background:#eef2ff;
display:flex;
justify-content:center;
align-items:center;
}

.card{
background:white;
width:400px;
padding:40px;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,0.08);
}

h2{
text-align:center;
margin-bottom:30px;
color:#222;
}

.input-group{
margin-bottom:18px;
}

input{
width:100%;
padding:14px;
border-radius:10px;
border:1px solid #ddd;
font-size:14px;
}

button{
width:100%;
padding:14px;
border-radius:10px;
border:none;
background:#4f46e5;
color:white;
font-size:15px;
font-weight:600;
cursor:pointer;
}

button:hover{
background:#3730a3;
}

.message{
background:#e6fffa;
color:#008060;
padding:10px;
border-radius:8px;
margin-bottom:15px;
text-align:center;
font-size:13px;
display:none;
}

.error{
background:#ffe5e5;
color:#cc0000;
padding:10px;
border-radius:8px;
margin-bottom:15px;
text-align:center;
font-size:13px;
display:none;
}

.link{
margin-top:20px;
text-align:center;
font-size:14px;
}

.link a{
color:#4f46e5;
text-decoration:none;
font-weight:500;
}

</style>

</head>

<body>

<div class="card">

<h2>Welcome Back</h2>

<div id="error" class="error"></div>
<div id="message" class="message"></div>

<form id="loginForm">

<div class="input-group">
<input type="text" id="username" placeholder="Username" required>
</div>

<div class="input-group">
<input type="password" id="password" placeholder="Password" required>
</div>

<button type="submit">
Login
</button>

</form>

<div class="link">
Don't have an account?
<a href="register.html">Register</a>
</div>

</div>


<script>

const form = document.getElementById("loginForm")

form.addEventListener("submit", async (e)=>{

e.preventDefault()

const username = document.getElementById("username").value
const password = document.getElementById("password").value

const res = await fetch("https://api.pdfmaster.com/login",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
username:username,
password:password
})
})

const data = await res.json()

if(res.ok){

document.getElementById("message").style.display="block"
document.getElementById("message").innerText="Login successful"

localStorage.setItem("token",data.token)

setTimeout(()=>{
window.location.href="dashboard.html"
},1000)

}else{

document.getElementById("error").style.display="block"
document.getElementById("error").innerText=data.detail

}

})

</script>

</body>
</html>
