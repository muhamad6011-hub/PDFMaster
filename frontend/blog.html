<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Blog | PDFMaster</title>

<meta name="description" content="Latest articles about PDF tools and productivity.">

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-50">

<!-- NAVBAR -->

<header class="bg-white shadow-sm">

<div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">

<a href="index.html" class="text-2xl font-bold text-red-600">
PDFMaster
</a>

<nav class="flex items-center space-x-6 text-sm md:text-base font-medium">

<a href="blog.html" class="text-red-600">Blog</a>
<a href="dashboard.html">Dashboard</a>
<a href="login.html">Login</a>

</nav>

</div>

</header>


<!-- CONTENT -->

<main class="max-w-7xl mx-auto px-6 py-10">

<h1 class="text-3xl font-bold mb-8">
Blog
</h1>

<div id="blog-list" class="grid md:grid-cols-2 gap-6">

<!-- posts will load here -->

</div>

</main>


<!-- FOOTER -->

<footer class="bg-gray-900 text-gray-300 mt-10">

<div class="max-w-7xl mx-auto px-6 py-12 text-center">

<p>© 2026 PDFMaster</p>

</div>

</footer>



<script>

async function loadPosts() {

const res = await fetch("https://api.pdfmaster.com/blog")

const posts = await res.json()

const container = document.getElementById("blog-list")

posts.forEach(post => {

container.innerHTML += `

<a href="post.html?slug=${post.slug}"
class="block bg-white p-6 rounded-lg shadow hover:shadow-lg transition">

<h2 class="text-xl font-semibold mb-2">
${post.title}
</h2>

<p class="text-gray-600 text-sm">
Read article →
</p>

</a>

`

})

}

loadPosts()

</script>

</body>
</html>
