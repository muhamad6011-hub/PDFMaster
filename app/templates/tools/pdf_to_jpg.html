{% extends "base.html" %}
{% block content %}

<div class="max-w-2xl mx-auto bg-white p-8 shadow rounded-lg">
    <h1 class="text-2xl font-bold mb-4 text-red-600">PDF to JPG</h1>
    <p class="text-gray-600 mb-6">
        Convert PDF pages into JPG images.
    </p>

    <form action="/tools/pdf-to-jpg" method="post" enctype="multipart/form-data">
        <input type="file" name="file" accept=".pdf"
               class="w-full border p-3 rounded mb-4" required>

        <button type="submit"
                class="bg-red-600 text-white px-6 py-2 rounded hover:bg-red-700 w-full">
            Convert to JPG
        </button>
    </form>
</div>

{% endblock %}
