{% extends "base.html" %}

{% block title %}Blog | PDFMaster{% endblock %}

{% block description %}
Latest articles about PDF tools and productivity.
{% endblock %}

{% block content %}

<h1 class="text-3xl font-bold mb-8">Blog</h1>

<div class="grid md:grid-cols-2 gap-6">

{% for post in posts %}

<a href="/blog/{{ post.slug }}" class="block bg-white p-6 rounded-lg shadow hover:shadow-lg transition">

<h2 class="text-xl font-semibold mb-2">
{{ post.title }}
</h2>

<p class="text-gray-600 text-sm">
Read article →
</p>

</a>

{% endfor %}

</div>

{% endblock %}
